name: DoD Check

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      closure_mode:
        description: "Closure chain mode: quick (default), full, skip"
        required: false
        default: quick
        type: choice
        options:
          - quick
          - full
          - skip
      closure_timeout_seconds:
        description: "Per-step timeout seconds for closure chain"
        required: false
        default: "2400"
        type: string

jobs:
  dod-check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies for full closure mode
        if: github.event_name == 'workflow_dispatch' && inputs.closure_mode == 'full'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync

      - name: Run DoD Baseline Script (+ optional closure chain)
        shell: pwsh
        run: |
          $mode = "quick"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $dispatchMode = "${{ inputs.closure_mode }}"
            if ($dispatchMode) {
              $mode = $dispatchMode
            }
          }

          $timeoutSeconds = 2400
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawTimeout = "${{ inputs.closure_timeout_seconds }}"
            $parsedTimeout = 0
            if ([int]::TryParse($rawTimeout, [ref]$parsedTimeout)) {
              $timeoutSeconds = [Math]::Max(30, $parsedTimeout)
            }
          }

          $args = @("-RepoRoot", ".", "-ClosureTimeoutSeconds", "$timeoutSeconds")
          switch ($mode) {
            "quick" {
              $args += "-RunFullClosureChain"
              $args += "-ClosureQuickMode"
            }
            "full" {
              $args += "-RunFullClosureChain"
            }
            "skip" {
            }
            default {
              throw "Unsupported closure_mode: $mode"
            }
          }

          Write-Host "[dod-check] mode=$mode timeout=$timeoutSeconds"
          ./scripts/dod_check.ps1 @args

      - name: Render closure summary
        if: always()
        shell: pwsh
        run: |
          python scripts/render_release_closure_summary.py `
            --full-report scratch/reports/release_closure_chain_full_m0_m7_ci.json `
            --m0-m5-report scratch/reports/release_closure_chain_m0_m5_result.json `
            --m6-m7-report scratch/reports/ws22_phase3_release_chain_result.json `
            --output scratch/reports/release_closure_summary.md `
            --append-github-step-summary `
            --allow-missing-full-report

      - name: Upload closure reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dod-closure-reports
          path: |
            scratch/reports/release_closure_chain_full_m0_m7_ci.json
            scratch/reports/release_closure_chain_m0_m5_result.json
            scratch/reports/ws22_phase3_release_chain_result.json
            scratch/reports/release_closure_summary.md
          if-no-files-found: ignore
