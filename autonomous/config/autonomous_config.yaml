autonomous:
  enabled: false
  cycle_interval_seconds: 3600
  cli_tools:
    preferred: codex
    fallback_order:
    - claude
    - gemini
    max_retries: 2
  run_quality_checks: false
  fixed_timeout_seconds: 3600
  verification_fallback:
    enable_codex_mcp: true
    mcp_server_name: codex-cli
    tool_name: ask-codex
    sandbox_mode: read-only
    approval_policy: on-failure
  lease:
    enabled: true
    lease_name: global_orchestrator
    owner_id: ''
    renew_interval_seconds: 2
    ttl_seconds: 10
    standby_poll_interval_seconds: 2
  outbox_dispatch:
    enabled: true
    consumer_name: release-controller
    poll_interval_seconds: 2
    batch_size: 50
  release:
    enabled: true
    gate_policy_path: policy/gate_policy.yaml
    max_error_rate: 0.02
    max_latency_p95_ms: 1500.0
    min_kpi_ratio: 0.95
    auto_rollback_enabled: true
    rollback_command: ''
  watchdog:
    enabled: false
    warn_only: true
    cpu_percent: 85.0
    memory_percent: 85.0
    disk_percent: 90.0
    io_read_bps: 52428800
    io_write_bps: 52428800
    cost_per_hour: 5.0
  subagent_runtime:
    enabled: true
    max_subtasks: 16
    rollout_percent: 100
    fail_open: false
    enforce_scaffold_txn_for_write: true
    allow_legacy_fail_open_for_write: false
    disable_legacy_cli_fallback: true
    fail_open_budget_ratio: 0.15
    require_contract_negotiation: true
    require_scaffold_patch: true
    fail_fast_on_subtask_error: true
